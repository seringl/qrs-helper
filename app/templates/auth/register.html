{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="h3 mb-3">Create an account</h1>
    <div class="card shadow-sm"><div class="card-body">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" id="username" name="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="display_name">Display name</label>
          <input class="form-control" id="display_name" name="display_name" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">Email <span class="text-muted">(optional)</span></label>
          <input class="form-control" type="email" id="email" name="email">
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password <span class="text-muted">(8+ characters)</span></label>
          <input class="form-control" type="password" id="password" name="password" minlength="8" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="confirm">Confirm password</label>
          <input class="form-control" type="password" id="confirm" name="confirm" required>
        </div>
        <button class="btn btn-primary w-100">Register</button>
      </form>
    </div></div>
    <p class="text-muted small mt-2">New accounts require administrator approval before they can create content.</p>
  </div>
</div>
{% endblock %}
