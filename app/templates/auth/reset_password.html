{% extends "base.html" %}
{% block title %}Reset password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="h3 mb-3">Set a new password</h1>
    {% if forced %}
    <div class="alert alert-warning">You must set a new password before continuing.</div>
    {% endif %}
    <div class="card shadow-sm"><div class="card-body">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label" for="password">New password <span class="text-muted">(8+ characters)</span></label>
          <input class="form-control" type="password" id="password" name="password" minlength="8" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label" for="confirm">Confirm new password</label>
          <input class="form-control" type="password" id="confirm" name="confirm" required>
        </div>
        <button class="btn btn-primary w-100">Save password</button>
      </form>
    </div></div>
  </div>
</div>
{% endblock %}
