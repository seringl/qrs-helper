# Reverse proxy — DESIGN.md v2.3 §16.2
# Terminates TLS on 443, 301-redirects port 80, serves static files,
# and sets the X-Forwarded-* headers required by ProxyFix (§14.3).

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    location /static/ {
        alias /srv/static/;
        expires 7d;
    }

    location / {
        proxy_pass http://app:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 120s;   # card generation calls two external APIs
    }
}
